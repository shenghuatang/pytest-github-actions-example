name: Run Unit Test via Pytest Allure

on:
  #push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for playsound
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 \
            gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-ugly

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov allure-pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check --output-format=github --target-version=py313 .
        continue-on-error: true

      - name: Test with pytest
        run: |
          pytest --alluredir=allure-results --cov=. --cov-report=xml --cov-report=html:coverage-html -v -s
        continue-on-error: true

      - name: Check coverage-html output
        run: |
          ls -la coverage-html || echo "coverage-html directory NOT found!"
        if: always()

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report
        continue-on-error: true

      - name: Move coverage HTML into Allure report directory
        run: |
          mkdir -p allure-report/coverage
          cp -r coverage-html/. allure-report/coverage/ || echo "Warning: coverage-html not found or empty, skipping copy"
          rm -f allure-report/coverage/.gitignore
        if: always()

      - name: Debug allure-report/coverage
        run: ls -la allure-report/coverage || echo "allure-report/coverage does NOT exist"
        if: always()

      - name: Upload Allure Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
        if: always()

      - name: Upload Coverage HTML Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html
        if: always()

      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: deploy to AWS EKS
        run: |
            echo "this is a mock deployment"
